<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>18th Birthday Invitation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="marble-bg"></div>
<div class="marble-veins"></div>
<div class="stars-field" id="starsField"></div>

<!-- reusable 4-point sparkle shape, referenced everywhere via <use> -->
<svg width="0" height="0" style="position:absolute">
  <symbol id="sparkleShape" viewBox="0 0 100 100">
    <path d="M50 0C50 28 28 50 0 50C28 50 50 72 50 100C50 72 72 50 100 50C72 50 50 28 50 0Z"/>
  </symbol>
</svg>

<audio id="bgm" src="music.mp3" loop preload="auto"></audio>

<section id="cover">
  <div class="cover-title">A little something for you...</div>
  <div class="cover-sub">tap the music box</div>

  <div class="box-wrap" id="boxWrap">
    <div class="box-lid">
      <div class="box-jewel"></div>
    </div>
    <div class="ballerina-stage">
      <div class="spin">
        <svg class="centerpiece-star"><use href="#sparkleShape"></use></svg>
      </div>
    </div>
    <div class="box-base"></div>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
    <span class="sparkle"></span>
  </div>

  <div class="tap-hint">tap to open</div>
  <div class="scroll-cue" id="scrollCue">keep scrolling<span>&#8595;</span></div>
</section>

<section id="invitation">
  <div class="card" id="card">
    <svg class="card-corner corner-tl" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 C 4 30, 10 50, 30 60 C 45 66, 60 62, 70 50 M4 4 C 20 6, 40 4, 55 14 C 65 20, 68 30, 66 40"/>
      <circle cx="4" cy="4" r="2.5"/>
    </svg>
    <svg class="card-corner corner-tr" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 C 4 30, 10 50, 30 60 C 45 66, 60 62, 70 50 M4 4 C 20 6, 40 4, 55 14 C 65 20, 68 30, 66 40"/>
      <circle cx="4" cy="4" r="2.5"/>
    </svg>
    <svg class="card-corner corner-bl" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 C 4 30, 10 50, 30 60 C 45 66, 60 62, 70 50 M4 4 C 20 6, 40 4, 55 14 C 65 20, 68 30, 66 40"/>
      <circle cx="4" cy="4" r="2.5"/>
    </svg>
    <svg class="card-corner corner-br" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4 C 4 30, 10 50, 30 60 C 45 66, 60 62, 70 50 M4 4 C 20 6, 40 4, 55 14 C 65 20, 68 30, 66 40"/>
      <circle cx="4" cy="4" r="2.5"/>
    </svg>

    <div class="eyebrow">You are invited to celebrate</div>
    <div class="num-18">18</div>
    <div class="invite-line">the birthday of</div>
    <div class="name-placeholder">Maria Sabine</div>

    <div class="details">
      Sunday, August 16
      <span class="label">Date</span>
      [ Venue / Location Here ]
      <span class="label">Where</span>
      5:00 PM
      <span class="label">Time</span>
    </div>

    <hr class="divider"/>

    <p class="surprise">
      
      <span class="sign"></span>
    </p>
  </div>
</section>

<script src="js/function.js"></script>

</body>
</html>
